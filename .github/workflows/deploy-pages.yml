name: Deploy calorie tracker to GitHub Pages

on:
  push:
    branches: [main, claude/calorie-tracker-app-4pojan]
    paths: ["calorie-tracker/**", ".github/workflows/deploy-pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run unit tests
        run: |
          node calorie-tracker/tests/nutrition.test.js
          node calorie-tracker/tests/barcode.test.js

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: calorie-tracker
      - id: deployment
        uses: actions/deploy-pages@v4
